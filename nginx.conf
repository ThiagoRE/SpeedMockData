server {
    listen 80;
    server_name localhost;

    # Directorio donde se encuentran los archivos construidos
    root /usr/share/nginx/html;
    index index.html;

    # Habilitar compresión Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Soporte para Vue Router (Modo History)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Política de caché para index.html (NUNCA cachear el punto de entrada)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires -1;
    }

    # Estrategia de caché agresiva para activos con hash (imprimibles por Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Configuración de caché para otros activos estáticos
    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        expires 1M;
        add_header Cache-Control "public";
    }

    # Manejo de errores
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
